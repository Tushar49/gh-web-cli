name: Bug report
description: Something broke - usually a GitHub selector rename or an unexpected page state.
labels: ["bug"]
body:
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The exact `gh-web-cli ...` invocation, plus any wrapping shell.
      placeholder: |
        node dist/cli.js upload --repo Tushar49/foo --branch main --files ./a.ts --message "x"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output / error
      description: Full output, including stack traces. Redact tokens or private repo names if needed.
      render: shell
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: GitHub page URL where the failure happened
      description: If you can, open the same page manually so we can compare.
      placeholder: https://github.com/owner/repo/upload/main/src

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Chromium
        - Other (mention in additional context)
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: e.g. Chrome 137.0.7000.0

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / macOS 14 / Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. v20.18.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Was github.com rendering normally in the same browser tab? Any errors in the browser's DevTools console?
